<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLEMINE Dashboard</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
font-size:20px;
}

.card:hover{
background:#334155;
cursor:pointer;
}

a{
text-decoration:none;
color:white;
}
</style>

</head>

<body>

<header>
📊 CANDLEMINE Dashboard
</header>

<div class="container">

<a href="#"><div class="card">Volatility 10</div></a>

<a href="#"><div class="card">Volatility 25</div></a>

<a href="#"><div class="card">Volatility 50</div></a>

<a href="#"><div class="card">Volatility 75</div></a>

<a href="#"><div class="card">Volatility 100</div></a>

<a href="#"><div class="card">Boom 500</div></a>

<a href="#"><div class="card">Crash 500</div></a>

<a href="#"><div class="card">Jump 10</div></a>

<a href="#"><div class="card">Step Index</div></a>

</div>

</body>
  </html>
